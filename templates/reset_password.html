{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.png' %}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | AI Sales Bot</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #ede9fe;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --input-bg: #f1f5f9;
            --input-focus: #ffffff;
            --border: #e2e8f0;
            --border-focus: #a5b4fc;
            --success: #16a34a;
            --danger: #dc2626;
            --shadow: 0 20px 60px rgba(15, 23, 42, 0.08), 0 4px 16px rgba(15, 23, 42, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(99, 102, 241, 0.06) 0px, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(79, 70, 229, 0.05) 0px, transparent 60%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .split-wrapper {
            display: flex;
            align-items: stretch;
            width: 100%;
            max-width: 900px;
            min-height: 520px;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        /* ── Brand Panel ── */
        .brand-panel {
            flex: 1;
            background: linear-gradient(145deg, #4f46e5 0%, #7c3aed 60%, #a855f7 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            top: -80px;
            right: -80px;
        }

        .brand-panel::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            bottom: -50px;
            left: -50px;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.03em;
        }

        .brand-logo span {
            opacity: 0.7;
        }

        .brand-tagline {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            letter-spacing: -0.02em;
        }

        .brand-sub {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            max-width: 280px;
        }

        .shield-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.5rem;
        }

        .shield-icon svg {
            width: 40px;
            height: 40px;
            stroke: #fff;
            stroke-width: 1.5;
        }

        /* ── Form Panel ── */
        .form-panel {
            width: 420px;
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 0.4rem;
        }

        .form-header p {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.45rem;
        }

        .input-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 13px;
            display: flex;
            align-items: center;
            pointer-events: none;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .input-icon svg {
            width: 17px;
            height: 17px;
            stroke-width: 1.8;
        }

        .input-wrap input {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 2.6rem;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
        }

        .input-wrap input::placeholder {
            color: #b0bec5;
        }

        .input-wrap input:focus {
            outline: none;
            background: var(--input-focus);
            border-color: var(--border-focus);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
        }

        .input-wrap input:focus+.input-icon,
        .input-wrap:focus-within .input-icon {
            color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            color: var(--danger);
            border: 1px solid #fecaca;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .error-message.show {
            display: flex;
        }

        .success-message {
            background: #f0fdf4;
            color: var(--success);
            border: 1px solid #bbf7d0;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: none;
            text-align: center;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-direction: column;
        }

        .success-message.show {
            display: flex;
        }

        .success-message a {
            display: inline-block;
            margin-top: 0.5rem;
            padding: 0.5rem 1.5rem;
            background: var(--success);
            color: #fff;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .success-message a:hover {
            opacity: 0.85;
        }

        .eye-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            display: flex;
            align-items: center;
            padding: 0;
            transition: color 0.2s;
        }

        .eye-btn:hover {
            color: var(--primary);
        }

        .eye-btn svg {
            width: 17px;
            height: 17px;
            stroke-width: 1.8;
        }

        .has-eye input {
            padding-right: 2.6rem;
        }

        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }

        .invalid-token-wrapper {
            text-align: center;
            padding: 2rem;
        }

        .invalid-token-wrapper h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.75rem;
            color: var(--danger);
        }

        .invalid-token-wrapper p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }

        .invalid-token-wrapper a {
            display: inline-block;
            padding: 0.7rem 1.5rem;
            background: var(--primary);
            color: #fff;
            border-radius: 10px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
        }

        .invalid-token-wrapper a:hover {
            background: var(--primary-hover);
        }

        @media (max-width: 700px) {
            .brand-panel {
                display: none;
            }

            .form-panel {
                width: 100%;
                border-radius: 28px;
            }

            .split-wrapper {
                border-radius: 28px;
            }
        }

        @media (max-width: 480px) {
            body { padding: 1rem; }
            .split-wrapper { border-radius: 20px; }
            .form-panel { padding: 2rem 1.5rem; border-radius: 20px; }
            .form-header h1 { font-size: 1.4rem; }
            .form-header p { font-size: 0.82rem; }
            .input-wrap input { padding: 0.7rem 0.9rem 0.7rem 2.4rem; font-size: 0.88rem; }
            .submit-btn { padding: 0.75rem; font-size: 0.88rem; }
        }
    </style>
</head>

<body>
    <div class="split-wrapper">
        <!-- Brand Panel -->
        <div class="brand-panel">
            <div class="shield-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
            </div>
            <div class="brand-logo">AI <span>SalesBot</span></div>
            <div class="brand-tagline">Set your new password</div>
            <p class="brand-sub">Choose a new password for your account. You'll be able to log in immediately after resetting.</p>
        </div>

        <!-- Form Panel -->
        <div class="form-panel" id="formPanel">
            <div class="form-header">
                <h1>Reset Password</h1>
                <p>Enter your new password below.</p>
            </div>

            <div id="successBox" class="success-message">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span>Your password has been reset successfully!</span>
                <a href="/accounts/login/">Go to Login →</a>
            </div>
            <div id="errorBox" class="error-message">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor"
                    stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <span id="errorText"></span>
            </div>

            <form id="resetForm" novalidate>
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="input-wrap has-eye">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path stroke-linecap="round" stroke-linejoin="round" d="M7 11V7a5 5 0 0110 0v4" />
                            </svg>
                        </span>
                        <input type="password" id="newPassword" placeholder="Enter new password" required
                            autocomplete="new-password">
                        <button type="button" class="eye-btn" onclick="togglePw('newPassword', this)" tabindex="-1"
                            aria-label="Toggle password">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="input-wrap has-eye">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </span>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required
                            autocomplete="new-password">
                        <button type="button" class="eye-btn" onclick="togglePw('confirmPassword', this)" tabindex="-1"
                            aria-label="Toggle password">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                    d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" stroke="currentColor"
                        stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                    Reset Password
                </button>
            </form>
        </div>
    </div>

    <script>
        function togglePw(inputId, btn) {
            const inp = document.getElementById(inputId);
            const isHidden = inp.type === 'password';
            inp.type = isHidden ? 'text' : 'password';
            btn.innerHTML = isHidden
                ? `<svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" width="17" height="17"><path stroke-linecap="round" stroke-linejoin="round" d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" width="17" height="17"><path stroke-linecap="round" stroke-linejoin="round" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        }

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('formPanel').innerHTML = `
                <div class="invalid-token-wrapper">
                    <h2>Invalid Link</h2>
                    <p>This password reset link is invalid or missing a token. Please request a new one.</p>
                    <a href="/accounts/forgot-password/">Request New Link</a>
                </div>
            `;
        }

        document.getElementById('resetForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            const successBox = document.getElementById('successBox');

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                errorText.innerText = 'Passwords do not match.';
                errorBox.classList.add('show');
                return;
            }

            submitBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> Resetting…`;
            submitBtn.disabled = true;
            errorBox.classList.remove('show');
            successBox.classList.remove('show');

            try {
                const response = await fetch('/api/accounts/reset-password-api/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword }),
                });
                const data = await response.json();

                if (response.ok) {
                    successBox.classList.add('show');
                    document.getElementById('resetForm').style.display = 'none';
                } else {
                    errorText.innerText = data.error || 'Something went wrong.';
                    errorBox.classList.add('show');
                }
            } catch {
                errorText.innerText = 'An error occurred. Please check your connection.';
                errorBox.classList.add('show');
            } finally {
                submitBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg> Reset Password`;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
