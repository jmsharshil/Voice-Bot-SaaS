name: Build and deploy Python app to Azure Web App - insurancebot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Optional: keep if you want early failure detection
      - name: Install dependencies (optional)
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # 🚀 Direct deployment (NO ARTIFACT)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'insurancebot'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_FB7F36DA9B6C4B05A0D4F5ABAEB23ABE }}
          package: .
